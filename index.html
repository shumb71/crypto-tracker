<!DOCTYPE html>
<html lang="es">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Portfolio Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #f8f9fa; color: #1a1a1a; }
.app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 18px; font-weight: 500; }
.header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.sync-bar { font-size: 11px; color: #888; display: flex; align-items: center; gap: 6px; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.drive-btn { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; font-size: 12px; color: #555; height: 30px; transition: all 0.15s; }
.drive-btn:hover { background: #f3f4f6; }
.drive-btn.connected { border-color: #bbf7d0; background: #f0fdf4; color: #16a34a; }
.drive-btn.saving { border-color: #bfdbfe; background: #eff6ff; color: #2563eb; }
.nav { display: flex; gap: 4px; margin-bottom: 1.5rem; flex-wrap: wrap; border-bottom: 1px solid #e5e7eb; padding-bottom: 1rem; }
.nav-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid #e5e7eb; background: transparent; cursor: pointer; font-size: 13px; color: #555; transition: all 0.15s; }
.nav-btn:hover { background: #f3f4f6; }
.nav-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.section { display: none; }
.section.active { display: block; }
.card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 14px; }
.card-title { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
.metric { background: #f8f9fa; border-radius: 8px; padding: 0.75rem 1rem; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.metric-value { font-size: 16px; font-weight: 500; }
.green { color: #16a34a; }
.red { color: #dc2626; }
.muted { color: #888; }
.small { font-size: 12px; }
.row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
input, select { font-size: 13px; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; color: #1a1a1a; height: 34px; outline: none; }
input:focus, select:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
input[type="number"] { width: 130px; }
input[type="date"] { width: 148px; }
input[type="text"] { width: 110px; }
select { width: 115px; }
button { padding: 6px 14px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; font-size: 13px; color: #1a1a1a; height: 34px; transition: all 0.15s; white-space: nowrap; }
button:hover { background: #f3f4f6; }
button.primary { background: #6366f1; color: #fff; border-color: #6366f1; }
button.primary:hover { background: #4f46e5; }
button.danger { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
button.danger:hover { background: #fee2e2; }
button.success { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }
button.success:hover { background: #dcfce7; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; color: #888; font-weight: 500; padding: 6px 8px; border-bottom: 1px solid #f0f0f0; font-size: 11px; white-space: nowrap; }
td { padding: 8px 8px; border-bottom: 1px solid #f9f9f9; }
tr:last-child td { border-bottom: none; }
.tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
.tag-buy { background: #f0fdf4; color: #16a34a; }
.tag-sell { background: #fef2f2; color: #dc2626; }
.sym-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; background: #f3f4f6; color: #555; }
.ticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 8px; margin-bottom: 1.25rem; }
.ticker-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 14px; }
.ticker-sym { font-size: 11px; color: #888; font-weight: 500; }
.ticker-price { font-size: 15px; font-weight: 500; margin: 3px 0 2px; }
.ticker-chg { font-size: 12px; }
.sym-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.sym-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 99px; font-size: 12px; cursor: pointer; }
.sym-chip:hover { border-color: #fca5a5; background: #fef2f2; color: #dc2626; }
.sim-result-box { background: #f8f9fa; border-radius: 10px; padding: 1rem; margin-top: 1rem; }
.sim-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
.sim-row:last-child { border-bottom: none; font-weight: 500; font-size: 14px; }
.hidden { display: none; }
.ovx { overflow-x: auto; }
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1a1a1a; color: #fff; padding: 10px 16px; border-radius: 10px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; }
.concepto-card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:1.25rem 1.5rem; margin-bottom:16px; }
.concepto-title { font-size:16px; font-weight:600; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
.concepto-badge { font-size:11px; padding:2px 10px; border-radius:99px; background:#eff6ff; color:#2563eb; font-weight:500; }
.concepto-desc { color:#444; line-height:1.65; font-size:13.5px; }
.concepto-subtitulo { font-size:12px; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:0.04em; margin:14px 0 6px; }
.concepto-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px; margin:10px 0; }
.concepto-item { background:#f8f9fa; border-radius:8px; padding:10px 12px; }
.concepto-item-title { font-size:12px; font-weight:600; margin-bottom:3px; }
.concepto-item-desc { font-size:12px; color:#555; line-height:1.5; }
.concepto-alerta { background:#fffbeb; border:1px solid #fde68a; border-radius:8px; padding:8px 12px; font-size:12px; color:#92400e; margin-top:10px; }
.onda-diagram { display:flex; align-items:flex-end; gap:2px; height:80px; margin:12px 0; }
.onda-bar { display:flex; flex-direction:column; align-items:center; justify-content:flex-end; }
.onda-num { font-size:11px; font-weight:600; margin-top:4px; }
.div-example { display:flex; gap:16px; margin:10px 0; flex-wrap:wrap; }
.div-box { flex:1; min-width:160px; background:#f8f9fa; border-radius:8px; padding:10px 12px; }
.div-box-title { font-size:12px; font-weight:600; margin-bottom:4px; }
.div-box-desc { font-size:12px; color:#555; }
.libro-table th.col-debe { color: #dc2626; }
.libro-table th.col-haber { color: #16a34a; }
.libro-table td.debe { color: #dc2626; font-weight:500; }
.libro-table td.haber { color: #16a34a; font-weight:500; }
.libro-table td.saldo-pos { color: #16a34a; font-weight:600; }
.libro-table td.saldo-neg { color: #dc2626; font-weight:600; }
.libro-table tr.total-row { background: #f8f9fa; font-weight:600; border-top: 2px solid #e5e7eb; }
.libro-table tr.excluded { opacity: 0.4; text-decoration: line-through; }
.libro-toggle { display:flex; align-items:center; gap:6px; cursor:pointer; font-size:12px; color:#888; }
.libro-toggle input { width:14px; height:14px; cursor:pointer; }
.tramo-liquidado td { color: #dc2626 !important; text-decoration: line-through; opacity: 0.75; }
.tramo-liquidado td.no-strike { text-decoration: none; }
.badge-liquidado { display:inline-block; font-size:10px; padding:1px 7px; border-radius:99px; background:#fef2f2; color:#dc2626; border:1px solid #fecaca; font-weight:600; margin-left:6px; vertical-align:middle; }
.badge-parcial { display:inline-block; font-size:10px; padding:1px 7px; border-radius:99px; background:#fffbeb; color:#92400e; border:1px solid #fde68a; font-weight:600; margin-left:6px; vertical-align:middle; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Crypto Portfolio Tracker</h1>
    <div class="header-right">
      <div class="sync-bar" id="syncBar"><span class="live-dot"></span>Conectando...</div>
      <span style="font-size:11px;color:#aaa;font-weight:500;letter-spacing:0.03em;">v1.9</span>
      <button class="drive-btn" id="driveBtn" onclick="handleDriveAuth()">
        <i class="ti ti-brand-google-drive"></i>
        <span id="driveBtnText">Conectar Drive</span>
      </button>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="showSection('precios',this)"><i class="ti ti-chart-line"></i> Precios</button>
    <button class="nav-btn" onclick="showSection('operaciones',this)"><i class="ti ti-list"></i> Operaciones</button>
    <button class="nav-btn" onclick="showSection('portfolio',this)"><i class="ti ti-wallet"></i> Portfolio</button>
    <button class="nav-btn" onclick="showSection('simulador',this)"><i class="ti ti-calculator"></i> Simulador</button>
    <button class="nav-btn" onclick="showSection('historial',this)"><i class="ti ti-history"></i> Historial</button>
    <button class="nav-btn" onclick="showSection('libro',this)"><i class="ti ti-book"></i> Libro</button>
    <button class="nav-btn" onclick="showSection('conceptos',this)"><i class="ti ti-bulb"></i> Conceptos</button>
    <button class="nav-btn" onclick="showSection('futuros',this)"><i class="ti ti-trending-up"></i> Futuros</button>
  </nav>

  <div id="precios" class="section active">
    <div class="card">
      <div class="card-title">Gestionar monedas</div>
      <div class="sym-chips" id="symChips"></div>
      <div class="row">
        <input type="text" id="newSym" placeholder="Ej: DOGE" />
        <button onclick="addSymbol()"><i class="ti ti-plus"></i> Añadir</button>
      </div>
    </div>
    <div class="ticker-grid" id="tickerGrid"></div>
  </div>

  <div id="operaciones" class="section">
    <div class="card">
      <div class="card-title">Nueva operación</div>
      <div class="row">
        <select id="opType"><option value="buy">Compra</option><option value="sell">Venta</option></select>
        <select id="opSym"></select>
        <input type="number" id="opQty" placeholder="Cantidad" step="any" />
        <input type="date" id="opDate" />
        <button onclick="loadPriceForDate()"><i class="ti ti-cloud-download"></i> Cargar precio</button>
      </div>
      <div class="row">
        <input type="number" id="opPrice" placeholder="Precio USDT" step="any" />
        <input type="text" id="opNotes" placeholder="Notas (opcional)" style="flex:2;" />
        <button class="primary" onclick="addOperation()"><i class="ti ti-plus"></i> Añadir operación</button>
      </div>
      <div id="opMsg" class="small muted" style="margin-top:4px;"></div>
    </div>
    <div class="card">
      <div class="card-title">Operaciones registradas</div>
      <div class="row" style="margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <select id="filtroTipo" onchange="renderOpsTable()" style="width:120px;">
          <option value="">Todos los tipos</option>
          <option value="buy">Compra</option>
          <option value="sell">Venta</option>
        </select>
        <select id="filtroSym" onchange="renderOpsTable()" style="width:120px;">
          <option value="">Todos los pares</option>
        </select>
        <input type="date" id="filtroDesde" onchange="renderOpsTable()" placeholder="Desde" style="width:145px;" />
        <input type="date" id="filtroHasta" onchange="renderOpsTable()" placeholder="Hasta" style="width:145px;" />
        <button onclick="limpiarFiltros()" style="font-size:12px;height:30px;padding:0 10px;"><i class="ti ti-x"></i> Limpiar</button>
        <span id="filtroCount" class="small muted"></span>
      </div>
      <div class="ovx">
        <table>
          <thead><tr><th>Tipo</th><th>Símbolo</th><th>Cantidad</th><th>Precio USDT</th><th>Total USDT</th><th>Fecha</th><th>Notas</th><th></th></tr></thead>
          <tbody id="opsTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="portfolio" class="section">
    <div id="portfolioContent"></div>
  </div>

  <div id="simulador" class="section">
    <div class="card">
      <div class="card-title">Simulador de venta</div>
      <div class="row">
        <select id="simSym" onchange="updateSimQty()"></select>
        <input type="number" id="simPrice" placeholder="Precio venta USDT" step="any" style="width:170px;" />
        <input type="number" id="simQty" placeholder="Cantidad" step="any" style="width:140px;" />
        <button class="primary" onclick="runSim()"><i class="ti ti-calculator"></i> Simular</button>
      </div>
      <div id="simResult"></div>
    </div>
  </div>

  <div id="historial" class="section">
    <div class="card">
      <div class="card-title">Ventas realizadas</div>
      <div class="ovx">
        <table>
          <thead><tr><th>Símbolo</th><th>Cantidad</th><th>Precio venta</th><th>Coste base</th><th>P&L USDT</th><th>P&L %</th><th>Fecha</th></tr></thead>
          <tbody id="histTable"></tbody>
        </table>
      </div>
      <div id="histEmpty" class="muted small" style="padding:0.75rem 0;">No hay ventas registradas.</div>
    </div>
  </div>
</div>
  <div id="libro" class="section">
    <div id="libroContent"></div>
  </div>
  <div id="conceptos" class="section">
    <div id="conceptosContent"></div>
  </div>
  <div id="futuros" class="section">
    <div id="futurosContent"></div>
  </div>

<div class="toast" id="toast"></div>
<div class="toast" id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
const CLIENT_ID = '906920921997-8db6mc841ls32ucitrtdavglqu64j16e.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_FILE_NAME = 'crypto_tracker_data.json';
const DRIVE_FOLDER_NAME = 'CryptoTracker';

let symbols = ['BTC','ETH','SOL','BNB','XRP','ADA','DOGE'];
let prices = {};
let operations = [];
let saleHistory = [];
let futuresOps = [];
let futuresSaldo = 0;
let lastSaved = null;
let accessToken = null;
let driveFileId = null;
let saveTimer = null;
let tokenClient = null;

function showToast(msg, duration=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function fmt(n, d=2) {
  if (isNaN(n)) return '—';
  return Number(n).toLocaleString('es-ES', {minimumFractionDigits: d, maximumFractionDigits: d});
}
function fmtPrice(n) {
  if (!n || isNaN(n)) return '—';
  if (n >= 1000) return fmt(n, 2);
  if (n >= 1) return fmt(n, 4);
  return fmt(n, 6);
}

function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (id === 'portfolio') renderPortfolio();
  if (id === 'simulador') populateSimSelect();
  if (id === 'historial') renderHistory();
  if (id === 'libro') renderLibro();
  if (id === 'conceptos') renderConceptos();
  if (id === 'futuros') renderFuturos();
  if (id === 'operaciones') { renderOpsTable(); populateSymSelects(); }
}

async function fetchPrices() {
  try {
    const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
    const data = await res.json();
    data.forEach(t => {
      const sym = t.symbol.replace('USDT','');
      if (symbols.includes(sym)) {
        prices[sym] = { price: parseFloat(t.lastPrice), change: parseFloat(t.priceChangePercent) };
      }
    });
    renderTickers();
    refreshAll();
    updateSyncBar();
  } catch(e) {
    document.getElementById('syncBar').innerHTML = '<span style="color:#dc2626">Error de conexión</span>';
  }
}

function updateSyncBar() {
  const now = new Date().toLocaleTimeString('es-ES');
  const driveStatus = accessToken
    ? (lastSaved ? `Drive: ${lastSaved}` : 'Drive conectado')
    : 'Sin Drive (local)';
  document.getElementById('syncBar').innerHTML = `<span class="live-dot"></span>Precios: ${now} | ${driveStatus}`;
}

function renderTickers() {
  document.getElementById('tickerGrid').innerHTML = symbols.map(s => {
    const p = prices[s];
    if (!p) return `<div class="ticker-card"><div class="ticker-sym">${s}/USDT</div><div class="ticker-price muted">—</div></div>`;
    const cls = p.change >= 0 ? 'green' : 'red';
    return `<div class="ticker-card">
      <div class="ticker-sym">${s}/USDT</div>
      <div class="ticker-price">${fmtPrice(p.price)}</div>
      <div class="ticker-chg ${cls}">${p.change >= 0 ? '+' : ''}${fmt(p.change,2)}% 24h</div>
    </div>`;
  }).join('');
  renderSymChips();
  populateSymSelects();
}

function renderSymChips() {
  document.getElementById('symChips').innerHTML = symbols.map(s =>
    `<span class="sym-chip" onclick="removeSymbol('${s}')" title="Click para eliminar"><i class="ti ti-x" style="font-size:10px"></i> ${s}</span>`
  ).join('');
}

function addSymbol() {
  const val = document.getElementById('newSym').value.trim().toUpperCase();
  if (!val || symbols.includes(val)) return;
  symbols.push(val);
  document.getElementById('newSym').value = '';
  fetchPrices();
  scheduleSave();
}

function removeSymbol(s) {
  symbols = symbols.filter(x => x !== s);
  delete prices[s];
  renderTickers();
  scheduleSave();
}

function populateSymSelects() {
  ['opSym','simSym'].forEach(id => {
    const el = document.getElementById(id);
    const cur = el.value;
    el.innerHTML = symbols.map(s => `<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('');
  });
}

async function loadPriceForDate() {
  const date = document.getElementById('opDate').value;
  const sym = document.getElementById('opSym').value;
  if (!date || !sym) { document.getElementById('opMsg').textContent = 'Selecciona símbolo y fecha primero.'; return; }
  document.getElementById('opMsg').textContent = 'Cargando precio histórico de Binance...';
  try {
    const ts = new Date(date + 'T00:00:00Z').getTime();
    const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}USDT&interval=1d&startTime=${ts}&endTime=${ts+86400000}&limit=1`);
    const data = await res.json();
    if (data && data.length > 0) {
      const close = parseFloat(data[0][4]);
      document.getElementById('opPrice').value = close;
      document.getElementById('opMsg').innerHTML = `<span class="green">✓</span> Precio de cierre del ${date}: <strong>${fmtPrice(close)} USDT</strong> — editable si lo necesitas.`;
    } else {
      document.getElementById('opMsg').textContent = 'No se encontraron datos para esa fecha.';
    }
  } catch(e) {
    document.getElementById('opMsg').textContent = 'Error al cargar precio.';
  }
}

function addOperation() {
  const type  = document.getElementById('opType').value;
  const sym   = document.getElementById('opSym').value;
  const qty   = parseFloat(document.getElementById('opQty').value);
  const price = parseFloat(document.getElementById('opPrice').value);
  const date  = document.getElementById('opDate').value;
  const notes = document.getElementById('opNotes').value.trim();
  if (!sym || isNaN(qty) || qty <= 0 || isNaN(price) || price <= 0 || !date) {
    document.getElementById('opMsg').textContent = 'Completa todos los campos correctamente.';
    return;
  }
  operations.push({ id: Date.now(), type, sym, qty, price, date, notes });
  operations.sort((a,b) => a.date.localeCompare(b.date));
  document.getElementById('opMsg').innerHTML = `<span class="green">✓</span> ${type==='buy'?'Compra':'Venta'} de ${fmt(qty,6)} ${sym} a ${fmtPrice(price)} USDT registrada.`;
  document.getElementById('opQty').value = '';
  document.getElementById('opPrice').value = '';
  document.getElementById('opNotes').value = '';
  renderOpsTable();
  refreshAll();
  scheduleSave();
}

function deleteOp(id) {
  if (!confirm('¿Eliminar esta operación?')) return;
  operations = operations.filter(o => o.id !== id);
  renderOpsTable();
  refreshAll();
  scheduleSave();
}

function editOpPrice(id) {
  const op = operations.find(o => o.id === id);
  if (!op) return;
  const newPrice = prompt(`Nuevo precio (actual: ${op.price}):`, op.price);
  if (newPrice === null) return;
  const p = parseFloat(newPrice);
  if (isNaN(p) || p <= 0) { alert('Precio no válido.'); return; }
  op.price = p;
  renderOpsTable();
  refreshAll();
  scheduleSave();
}

function editOpNotes(id, value) {
  const op = operations.find(o => o.id === id);
  if (!op) return;
  op.notes = value.trim();
  scheduleSave();
  renderPortfolio();
}

function refreshAll() {
  renderPortfolio();
  populateSimSelect();
  renderHistory();
  renderLibro();
}

function updateFiltroSymOptions() {
  const sel = document.getElementById('filtroSym');
  if (!sel) return;
  const cur = sel.value;
  const symsUsed = [...new Set(operations.map(o => o.sym))].sort();

  document.getElementById('filtroSym').value = '';
  document.getElementById('filtroDesde').value = '';
  document.getElementById('filtroHasta').value = '';

function renderOpsTable() {
  updateFiltroSymOptions();
  const tbody = document.getElementById('opsTable');
  if (!operations.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="muted" style="padding:1rem 0 0.5rem;">No hay operaciones registradas.</td></tr>';
    const c = document.getElementById('filtroCount'); if(c) c.textContent = '';
    return;
  }
  const filtroTipo = document.getElementById('filtroTipo')?.value || '';
  const filtroSym = document.getElementById('filtroSym')?.value || '';
  const filtroDesde = document.getElementById('filtroDesde')?.value || '';
  const filtroHasta = document.getElementById('filtroHasta')?.value || '';
  let filtered = operations.filter(o => {
    if (filtroTipo && o.type !== filtroTipo) return false;

    if (filtroHasta && o.date > filtroHasta) return false;

  if (countEl) countEl.textContent = filtered.length !== operations.length ? `${filtered.length} de ${operations.length} operaciones` : `${operations.length} operaciones`;

      <td>${fmt(o.qty*o.price,2)} USDT</td>
      <td>${o.date}</td>
      <td style="min-width:140px;"><input type="text" value="${(o.notes||'').replace(/"/g,'&quot;')}" placeholder="—" style="width:100%;font-size:12px;background:transparent;border:none;border-bottom:1px solid var(--border);padding:2px 4px;" onchange="editOpNotes(${o.id},this.value)" /></td>
      <td><button class="danger" onclick="deleteOp(${o.id})" style="height:28px;padding:0 8px;font-size:11px;"><i class="ti ti-trash"></i></button></td>

}

// portfolioMatches: { sellId -> [ {buyId, qty}, ... ] }
let portfolioMatches = {};
// portfolioExcluded: { sym -> [buyId, ...] }
let portfolioExcluded = {};

function getPortfolio() {
  const raw = {};
  operations.forEach(o => {
    if (!raw[o.sym]) raw[o.sym] = { buys: [], sells: [] };
    if (o.type === 'buy') raw[o.sym].buys.push({...o});
    else                  raw[o.sym].sells.push({...o});
  });

  const port = {};
  Object.entries(raw).forEach(([sym, {buys, sells}]) => {
    const buyMap = {};
    buys.forEach(b => { buyMap[b.id] = {...b, saldadoQty: 0, saldadoBy: []}; });

    sells.forEach(sell => {
      const links = portfolioMatches[sell.id] || [];
      links.forEach(link => {
        if (buyMap[link.buyId]) {
          buyMap[link.buyId].saldadoQty += link.qty;
          buyMap[link.buyId].saldadoBy.push({sellId: sell.id, qty: link.qty});
        }
      });
    });

    const buyList = buys.map(b => {
      const bm = buyMap[b.id];
      bm.remaining = Math.max(0, bm.qty - bm.saldadoQty);
      return bm;
    });

    let totalQty = 0, totalCost = 0;
    buyList.forEach(b => {
      const excluded = (portfolioExcluded[sym] || []).includes(b.id);
      b.excluded = excluded;
      if (!excluded) { totalQty += b.remaining; totalCost += b.remaining * b.price; }
    });

    port[sym] = { buys: buyList, sells, totalQty, totalCost };
  });
  return port;
}

function toggleExcludeBuy(sym, buyId) {
  if (!portfolioExcluded[sym]) portfolioExcluded[sym] = [];
  const idx = portfolioExcluded[sym].indexOf(buyId);
  if (idx >= 0) portfolioExcluded[sym].splice(idx, 1);
  else portfolioExcluded[sym].push(buyId);
  scheduleSave();
  renderPortfolio();
}

// Track which symbols have detail expanded
let portfolioExpanded = {};

function togglePortfolioDetail(sym) {
  portfolioExpanded[sym] = !portfolioExpanded[sym];
  const el = document.getElementById('portdetail_' + sym);
  const chk = document.getElementById('portchk_' + sym);
  if (el) el.style.display = portfolioExpanded[sym] ? 'block' : 'none';
  if (chk) chk.checked = !!portfolioExpanded[sym];
}

// Add or update a buy link for a sell — updates DOM directly, no full re-render
function addBuyLink(sellId, sym) {
  const selEl = document.getElementById('newlink_buy_' + sellId);
  const qtyEl = document.getElementById('newlink_qty_' + sellId);
  if (!selEl || !qtyEl) return;
  const buyId = parseInt(selEl.value);
  const qty   = parseFloat(qtyEl.value);
  if (!buyId || isNaN(qty) || qty <= 0) { alert('Selecciona una compra e indica una cantidad válida.'); return; }

  if (!portfolioMatches[sellId]) portfolioMatches[sellId] = [];
  const existing = portfolioMatches[sellId].find(l => l.buyId === buyId);
  if (existing) { existing.qty = qty; }
  else { portfolioMatches[sellId].push({buyId, qty}); }

  casarSelectedBuy[sellId] = buyId;
  scheduleSave();

  // Refresh only the sell card DOM, not the whole portfolio
  refreshSellCard(sellId, sym);
}

function refreshSellCard(sellId, sym) {
  const port = getPortfolio();
  const data = port[sym];
  if (!data) return;
  const sell = data.sells.find(s => s.id === sellId);
  if (!sell) return;

  const links     = portfolioMatches[sell.id] || [];
  const linkedQty = links.reduce((s, l) => s + l.qty, 0);
  const pending   = sell.qty - linkedQty;
  const fullyCasada = pending < 0.000001;
  const hasSome     = links.length > 0;

  // Update badge
  const badgeEl = document.getElementById('sell_badge_' + sellId);
  if (badgeEl) {
    let totalPnl = 0;
    links.forEach(link => {
      const buy = data.buys.find(b => b.id === link.buyId);
      if (buy) totalPnl += (sell.price - buy.price) * link.qty;
    });
    const pnlCls = totalPnl >= 0 ? 'green' : 'red';
    const pnlTxt = hasSome ? `<span class="${pnlCls}" style="font-weight:600;margin-left:6px;">${totalPnl>=0?'+':''}${fmt(totalPnl,2)} USDT</span>` : '';
    const badge  = fullyCasada
      ? `<span class="badge-liquidado">Casada</span>`
      : hasSome
        ? `<span class="badge-parcial">Parcial · falta ${fmt(pending,6)}</span>`
        : `<span class="badge-parcial">Sin casar</span>`;
    badgeEl.innerHTML = badge + pnlTxt;
  }

  // Update linked buys list
  const listEl = document.getElementById('sell_links_' + sellId);
  if (listEl) {
    let listHtml = '';
    if (links.length) {
      listHtml += `<div style="font-weight:600;margin-bottom:4px;color:#888;font-size:12px;">Compras asignadas:</div>`;
      links.forEach(link => {
        const buy = data.buys.find(b => b.id === link.buyId);
        if (!buy) return;
        const lPnl = (sell.price - buy.price) * link.qty;
        const lCls = lPnl >= 0 ? 'green' : 'red';
        listHtml += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap;font-size:12px;">
          <span style="color:#dc2626;">●</span>
          <span>${buy.date} · ${fmt(link.qty,6)} ${sym} @ ${fmtPrice(buy.price)}</span>
          <span class="${lCls}" style="font-weight:600;">${lPnl>=0?'+':''}${fmt(lPnl,2)} USDT</span>
          <button style="height:20px;padding:0 7px;font-size:10px;color:#dc2626;border-color:#fecaca;" onclick="removeBuyLink(${sell.id},${link.buyId},'${sym}')">✕</button>
        </div>`;
      });
    }
    listEl.innerHTML = listHtml;
  }

  // Update counter
  const counterEl = document.getElementById('sell_counter_' + sellId);
  if (counterEl) {
    counterEl.innerHTML = `Cubierto: <strong>${fmt(linkedQty,6)}</strong> / ${fmt(sell.qty,6)} · Pendiente: <strong style="color:${pending>0.000001?'#f59e0b':'#22c55e'}">${fmt(Math.max(0,pending),6)}</strong>`;
  }

  // Auto-fill qty for currently selected buy after adding
  const selEl = document.getElementById('newlink_buy_' + sellId);
  if (selEl) {
    // Move to next unlinked buy if current is now fully linked
    const currentBuyId = parseInt(selEl.value);
    const currentBuy   = data.buys.find(b => b.id === currentBuyId);
    const currentLinkedQty = links.find(l => l.buyId === currentBuyId)?.qty || 0;
    if (currentBuy && currentBuy.qty - currentLinkedQty < 0.000001) {
      // find next unlinked buy
      const nextBuy = data.buys.find(b => {
        const lq = links.find(l => l.buyId === b.id)?.qty || 0;
        return b.qty - lq > 0.000001;
      });
      if (nextBuy) { selEl.value = nextBuy.id; casarSelectedBuy[sellId] = nextBuy.id; }
    }
    onNewLinkBuyChange(sellId, sym);
  }
}

function removeBuyLink(sellId, buyId, sym) {
  if (!portfolioMatches[sellId]) return;
  portfolioMatches[sellId] = portfolioMatches[sellId].filter(l => l.buyId !== buyId);
  scheduleSave();
  // Full re-render needed to update buy tramos table
  renderPortfolio();
}

function clearSellLinks(sellId) {
  delete portfolioMatches[sellId];
  delete casarSelectedBuy[sellId];
  scheduleSave();
  renderPortfolio();
}

function toggleCasarSelector(sellId) {
  const box = document.getElementById('casar_' + sellId);
  if (!box) return;
  const opening = box.style.display === 'none';
  box.style.display = opening ? 'block' : 'none';
  if (opening) {
    const selEl = document.getElementById('newlink_buy_' + sellId);
    if (selEl) onNewLinkBuyChange(sellId, selEl.dataset.sym);
  }
}

let casarOpen = {};

let casarSelectedBuy = {};

function toggleCasarSelectorTracked(sellId) {
  casarOpen[sellId] = !casarOpen[sellId];

// When user picks a buy in the add-link selector, auto-fill with buy's full qty
function onNewLinkBuyChange(sellId, sym) {
  const port = getPortfolio();
  const data = port[sym];
  if (!data) return;
  const selEl = document.getElementById('newlink_buy_' + sellId);
  const qtyEl = document.getElementById('newlink_qty_' + sellId);
  if (!selEl || !qtyEl) return;
  const buyId = parseInt(selEl.value);
  casarSelectedBuy[sellId] = buyId;
  const buy = data.buys.find(b => b.id === buyId);
  if (!buy) return;
  // Propose full buy qty — user can edit if needed
  qtyEl.value = fmt(buy.qty, 6);
}

          html += `<div style="font-weight:600;margin-bottom:4px;color:#888;font-size:12px;">Compras asignadas:</div>`;
          links.forEach(link => {
            const buy = data.buys.find(b => b.id === link.buyId);
            if (!buy) return;
            const lPnl = (sell.price - buy.price) * link.qty;
            const lCls = lPnl >= 0 ? 'green' : 'red';
            html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap;font-size:12px;">
              <span style="color:#dc2626;">●</span>
              <span>${buy.date} · ${fmt(link.qty,6)} ${sym} @ ${fmtPrice(buy.price)}</span>
              <span class="${lCls}" style="font-weight:600;">${lPnl>=0?'+':''}${fmt(lPnl,2)} USDT</span>
              <button style="height:20px;padding:0 7px;font-size:10px;color:#dc2626;border-color:#fecaca;" onclick="removeBuyLink(${sell.id},${link.buyId},'${sym}')">✕</button>
            </div>`;
          });
        }
        html += `</div>`;

        // Add new link selector — shown inside toggleable box
        const availBuys = data.buys.filter(b => b.id !== undefined);
        const opts = availBuys.map(b => {
          const alreadyLinkedQty = links.find(l => l.buyId === b.id)?.qty || 0;
          const freeQty = b.remaining + alreadyLinkedQty;
          return `<option value="${b.id}">${b.date} · ${fmt(b.qty,6)} ${sym} · ${fmtPrice(b.price)} · libre: ${fmt(freeQty,6)}</option>`;
        }).join('');

        // Propose qty = full qty of first available buy
        const firstBuy = availBuys[0];
        const proposed = firstBuy ? fmt(firstBuy.qty, 6) : '0';

        html += `<div id="casar_${sell.id}" style="display:none;margin-top:10px;padding:10px;background:var(--bg);border-radius:6px;border:1px solid var(--border);">
          <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:8px;">Añadir compra asignada</div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <select id="newlink_buy_${sell.id}" data-sym="${sym}" data-sellid="${sell.id}" style="flex:2;min-width:220px;font-size:12px;" onchange="onNewLinkBuyChange(${sell.id},'${sym}')">${opts}</select>
            <input id="newlink_qty_${sell.id}" type="number" step="any" value="${proposed}" style="width:110px;font-size:12px;" placeholder="Cantidad">
            <button class="primary" style="height:30px;padding:0 12px;font-size:12px;" onclick="addBuyLink(${sell.id},'${sym}')">Añadir</button>
          </div>
          <div id="sell_counter_${sell.id}" style="font-size:11px;color:#aaa;margin-top:6px;">
            Cubierto: <strong>${fmt(linkedQty,6)}</strong> / ${fmt(sell.qty,6)} · Pendiente: <strong style="color:${pending>0.000001?'#f59e0b':'#22c55e'}">${fmt(Math.max(0,pending),6)}</strong>
          </div>
        </div>`;

        html += `</div>`;
      });
    }

    html += `</div></div>`; // close portdetail + card
  });

  document.getElementById('portfolioContent').innerHTML = hasAny
    ? html
    : '<div class="card muted">No tienes posiciones. Añade operaciones de compra en la pestaña Operaciones.</div>';

  // Restore open casar panels and trigger auto-fill
  Object.keys(casarOpen).forEach(sid => {
    if (casarOpen[sid]) {
      const box = document.getElementById('casar_' + sid);
      if (box) {
        box.style.display = 'block';
        const selEl = document.getElementById('newlink_buy_' + sid);
        if (selEl) {
          // Restore previously selected buy if still available
          const savedBuyId = casarSelectedBuy[sid];
          if (savedBuyId) {
            const opt = selEl.querySelector(`option[value="${savedBuyId}"]`);
            if (opt) selEl.value = savedBuyId;
          }
          onNewLinkBuyChange(parseInt(sid), selEl.dataset.sym);
        }
      }
    }
  });
}


function updateSimQty() {
  const sym = document.getElementById('simSym').value;
  const port = getPortfolio();
  const data = port[sym];
  if (data && data.totalQty > 0.000001) {
    document.getElementById('simQty').value = data.totalQty.toFixed(6);
  } else {
    document.getElementById('simQty').value = '';
  }
}

function populateSimSelect() {
  const port = getPortfolio();
  const active = Object.entries(port).filter(([s,d]) => d.totalQty > 0.000001);
  const sel = document.getElementById('simSym');
  const cur = sel.value;
  sel.innerHTML = active.length
    ? active.map(([s]) => `<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('')
    : '<option>Sin posiciones</option>';
  updateSimQty();
}

function runSim() {
  const sym = document.getElementById('simSym').value;
  const sellPrice = parseFloat(document.getElementById('simPrice').value);
  const port = getPortfolio();
  const data = port[sym];
  if (!data || data.totalQty < 0.000001) { document.getElementById('simResult').innerHTML = '<div class="muted small" style="margin-top:10px;">No tienes posición en este activo.</div>'; return; }
  if (isNaN(sellPrice) || sellPrice <= 0) { document.getElementById('simResult').innerHTML = '<div class="muted small" style="margin-top:10px;">Introduce un precio de venta válido.</div>'; return; }
  let qtyToSell = parseFloat(document.getElementById('simQty').value);
  if (isNaN(qtyToSell) || qtyToSell <= 0) qtyToSell = data.totalQty;
  const ratio = qtyToSell / data.totalQty;
  const avgCost = data.totalCost / data.totalQty;
  const costBasis = qtyToSell * avgCost;
  const saleValue = qtyToSell * sellPrice;
  const pnl = saleValue - costBasis;
  const pnlPct = (pnl / costBasis) * 100;
  const cls = pnl >= 0 ? 'green' : 'red';
  const tramoRows = data.buys.map(b => {
    const qty = b.qty * ratio;
    const cost = qty * b.price;
    const val = qty * sellPrice;
    const tp = val - cost;
    const tc = tp >= 0 ? 'green' : 'red';
    return `<tr>
      <td>${b.date}</td><td>${fmt(qty,6)} ${sym}</td>
      <td>${fmtPrice(b.price)}</td><td>${fmt(cost,2)} USDT</td>
      <td>${fmt(val,2)} USDT</td>
      <td class="${tc}">${tp>=0?'+':''}${fmt(tp,2)} USDT</td>
    </tr>`;
  }).join('');
  document.getElementById('simResult').innerHTML = `
    <div class="sim-result-box">
      <div class="sim-row"><span>Cantidad a vender</span><span>${fmt(qtyToSell,6)} ${sym}</span></div>
      <div class="sim-row"><span>Precio de venta</span><span>${fmtPrice(sellPrice)} USDT</span></div>
      <div class="sim-row"><span>Valor de venta</span><span>${fmt(saleValue,2)} USDT</span></div>
      <div class="sim-row"><span>Coste ponderado</span><span>${fmtPrice(avgCost)} USDT</span></div>
      <div class="sim-row"><span>Coste base</span><span>${fmt(costBasis,2)} USDT</span></div>
      <div class="sim-row"><span class="${cls}">P&L total</span><span class="${cls}">${pnl>=0?'+':''}${fmt(pnl,2)} USDT (${pnl>=0?'+':''}${fmt(pnlPct,2)}%)</span></div>
    </div>
    <div class="card" style="margin-top:12px;">
      <div class="card-title">Desglose por tramo de compra</div>
      <div class="ovx"><table>
        <thead><tr><th>Fecha compra</th><th>Qty proporcional</th><th>Precio compra</th><th>Coste</th><th>Ingreso</th><th>P&L</th></tr></thead>
        <tbody>${tramoRows}</tbody>
      </table></div>
    </div>
    <div style="text-align:right;margin-top:12px;">
      <button class="success" onclick="confirmSell('${sym}',${qtyToSell},${sellPrice},${pnl},${costBasis})"><i class="ti ti-check"></i> Registrar esta venta</button>
    </div>`;
}

function confirmSell(sym, qty, price, pnl, costBasis) {
  const today = new Date().toISOString().slice(0,10);
  saleHistory.push({ sym, qty, price, pnl, costBasis, date: today, id: Date.now() });
  operations.push({ id: Date.now()+1, type:'sell', sym, qty, price, date: today });
  document.getElementById('simResult').innerHTML = '<div class="small green" style="margin-top:10px;"><i class="ti ti-check"></i> Venta registrada. Puedes verla en Historial.</div>';
  scheduleSave();
}

function renderHistory() {

/* === GOOGLE DRIVE === */
function handleDriveAuth() {
  if (accessToken) {
    if (confirm('¿Desconectar Google Drive?')) {
      accessToken = null; driveFileId = null;
      document.getElementById('driveBtn').className = 'drive-btn';
      document.getElementById('driveBtnText').textContent = 'Conectar Drive';
      showToast('Drive desconectado');
      updateSyncBar();
    }
    return;
  }
  if (!window.google) { showToast('Google aún cargando, espera un momento...'); setTimeout(handleDriveAuth, 1500); return; }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { showToast('Error al conectar: ' + resp.error); return; }
      accessToken = resp.access_token;
      document.getElementById('driveBtn').className = 'drive-btn connected';
      document.getElementById('driveBtnText').textContent = 'Drive conectado';
      showToast('✓ Google Drive conectado — cargando datos...');
      await loadFromDrive();
    }
  });
  tokenClient.requestAccessToken({ prompt: '' });
}

async function findOrCreateFolder() {
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false&fields=files(id)`,
    { headers: { Authorization: `Bearer ${accessToken}` } }
  );
  const data = await res.json();
  if (data.files && data.files.length > 0) return data.files[0].id;
  const create = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: DRIVE_FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
  });
  const folder = await create.json();
  return folder.id;
}

async function findOrCreateFile() {
  const folderId = await findOrCreateFolder();
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_NAME}' and '${folderId}' in parents and trashed=false&fields=files(id)`,
    { headers: { Authorization: `Bearer ${accessToken}` } }
  );
  const data = await res.json();
  if (data.files && data.files.length > 0) { driveFileId = data.files[0].id; return driveFileId; }
  const create = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: DRIVE_FILE_NAME, parents: [folderId] })
  });
  const created = await create.json();
  driveFileId = created.id;
  return driveFileId;
}

async function loadFromDrive() {
  if (!accessToken) return;
  try {
    const fileId = await findOrCreateFile();
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    if (res.status === 200) {
      const text = await res.text();
      if (text && text.trim().startsWith('{')) {
        const d = JSON.parse(text);
        if (d.operations) operations = d.operations;
        if (d.saleHistory) saleHistory = d.saleHistory;
        if (d.symbols) symbols = d.symbols;
        if (d.lastSaved) lastSaved = d.lastSaved;
        if (d.futuresOps) futuresOps = d.futuresOps;
        if (d.futuresSaldo !== undefined) futuresSaldo = d.futuresSaldo;
        if (d.portfolioMatches) portfolioMatches = d.portfolioMatches;
        if (d.portfolioExcluded) portfolioExcluded = d.portfolioExcluded;
        renderOpsTable(); populateSymSelects(); renderSymChips(); fetchPrices();
        showToast('✓ Datos cargados desde Drive');
        updateSyncBar();
      } else {
        showToast('Drive conectado — carpeta CryptoTracker creada en tu Drive');
      }
    }
  } catch(e) { showToast('Error al leer Drive'); }
}

async function saveToDrive() {
  if (!accessToken) { saveToLocal(); return; }
  try {
    const btn = document.getElementById('driveBtn');
    btn.className = 'drive-btn saving';
    document.getElementById('driveBtnText').textContent = 'Guardando...';
    const fileId = driveFileId || await findOrCreateFile();
    lastSaved = new Date().toLocaleTimeString('es-ES');
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ operations, saleHistory, symbols, lastSaved, futuresOps, futuresSaldo, portfolioMatches, portfolioExcluded })
    });
    saveToLocal();
    btn.className = 'drive-btn connected';
    document.getElementById('driveBtnText').textContent = 'Drive conectado';
    updateSyncBar();
    showToast('✓ Guardado en Drive: ' + lastSaved);
  } catch(e) {
    showToast('Error al guardar en Drive');
    saveToLocal();
    document.getElementById('driveBtn').className = 'drive-btn connected';
    document.getElementById('driveBtnText').textContent = 'Drive conectado';
  }
}

function saveToLocal() {
  try { localStorage.setItem('crypto_tracker_v2', JSON.stringify({ operations, saleHistory, symbols, lastSaved, futuresOps, futuresSaldo, portfolioMatches, portfolioExcluded })); } catch(e) {}
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToDrive(), 1500);
}

function loadData() {
  try {
    const saved = localStorage.getItem('crypto_tracker_v2');
    if (saved) {
      const d = JSON.parse(saved);
      if (d.operations) operations = d.operations;
      if (d.saleHistory) saleHistory = d.saleHistory;
      if (d.symbols) symbols = d.symbols;
      if (d.lastSaved) lastSaved = d.lastSaved;
      if (d.futuresOps) futuresOps = d.futuresOps;
      if (d.futuresSaldo !== undefined) futuresSaldo = d.futuresSaldo;
      if (d.portfolioMatches) portfolioMatches = d.portfolioMatches;
      if (d.portfolioExcluded) portfolioExcluded = d.portfolioExcluded;
    }
  } catch(e) {}
}


function toggleLibroOp(id) {
  const op = operations.find(o => o.id === id);
  if (!op) return;
  op.excluded = !op.excluded;
  renderLibro();
  scheduleSave();
}

function renderLibro() {
  const syms = [...new Set(operations.map(o => o.sym))];
  if (!syms.length) {
    document.getElementById('libroContent').innerHTML = '<div class="card muted">No hay operaciones registradas.</div>';
    return;
  }
  let html = '';
  syms.forEach(sym => {
    const ops = operations.filter(o => o.sym === sym).sort((a,b) => a.date.localeCompare(b.date));
    let saldo = 0;
    let totalDebe = 0;
    let totalHaber = 0;
    const rows = ops.map(o => {
      const total = o.qty * o.price;
      const excluded = o.excluded || false;
      let debe = null, haber = null;
      if (!excluded) {
        if (o.type === 'buy') { debe = total; saldo -= total; totalDebe += total; }
        else { haber = total; saldo += total; totalHaber += total; }
      }
      const saldoClass = saldo >= 0 ? 'saldo-pos' : 'saldo-neg';
      const exClass = excluded ? 'excluded' : '';
      const checked = excluded ? '' : 'checked';
      const saldoCell = excluded ? '—' : (saldo >= 0 ? '+' : '') + fmt(saldo, 2) + ' USDT';
      return '<tr class="' + exClass + '">'
        + '<td><label class="libro-toggle"><input type="checkbox" ' + checked + ' onchange="toggleLibroOp(' + o.id + ')"> Incluir</label></td>'
        + '<td>' + o.date + '</td>'
        + '<td><span class="tag ' + (o.type === 'buy' ? 'tag-buy' : 'tag-sell') + '">' + (o.type === 'buy' ? 'Compra' : 'Venta') + '</span></td>'
        + '<td>' + fmt(o.qty, 6) + ' ' + sym + '</td>'
        + '<td>' + fmtPrice(o.price) + ' USDT</td>'
        + '<td class="debe">' + (debe !== null ? fmt(debe, 2) + ' USDT' : '—') + '</td>'
        + '<td class="haber">' + (haber !== null ? fmt(haber, 2) + ' USDT' : '—') + '</td>'
        + '<td class="' + (excluded ? '' : saldoClass) + '">' + saldoCell + '</td>'
        + '</tr>';
    }).join('');
    const resultado = totalHaber - totalDebe;
    const resClass = resultado >= 0 ? 'saldo-pos' : 'saldo-neg';
    html += '<div class="card">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
      + '<span style="font-size:16px;font-weight:500;">' + sym + '</span>'
      + '<span class="small muted">' + ops.length + ' operaciones &nbsp;|&nbsp; Resultado: <span class="' + resClass + '">' + (resultado >= 0 ? '+' : '') + fmt(resultado, 2) + ' USDT</span></span>'
      + '</div>'
      + '<div class="ovx"><table class="libro-table">'
      + '<thead><tr>'
      + '<th style="width:80px;">Incluir</th>'
      + '<th>Fecha</th><th>Tipo</th><th>Cantidad</th><th>Precio</th>'
      + '<th class="col-debe">Debe (inversión)</th>'
      + '<th class="col-haber">Haber (recuperado)</th>'
      + '<th>Saldo acumulado</th>'
      + '</tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '<tfoot><tr class="total-row">'
      + '<td colspan="5">Totales ' + sym + '</td>'
      + '<td class="debe">' + fmt(totalDebe, 2) + ' USDT</td>'
      + '<td class="haber">' + fmt(totalHaber, 2) + ' USDT</td>'
      + '<td class="' + resClass + '">' + (resultado >= 0 ? '+' : '') + fmt(resultado, 2) + ' USDT</td>'
      + '</tr></tfoot>'
      + '</table></div></div>';
  });
  document.getElementById('libroContent').innerHTML = html;
}

            { t: 'Divergencia alcista', d: 'El precio hace un mínimo más bajo pero el indicador hace un mínimo más alto. La caída pierde fuerza. Posible giro al alza.' },
            { t: 'Convergencia', d: 'Precio e indicador van en la misma dirección. Confirma que la tendencia tiene fuerza y puede continuar.' }
          ]
        },
        {
          titulo: 'Indicadores donde más se usan',
          items: [
            { t: 'RSI', d: 'El más común para detectar divergencias.' },
            { t: 'MACD', d: 'Útil para divergencias en tendencias más largas.' },
            { t: 'Estocástico', d: 'Especialmente útil en rangos laterales.' }
          ]
        }
      ],
      alerta: 'Una divergencia puede durar varias velas antes de resolverse. No es señal de entrada inmediata, sino una alerta de debilidad en el movimiento.'
    }
  ];

  const html = conceptos.map(c => {
    const seccionesHtml = c.secciones.map(s =>
      '<div class="concepto-subtitulo">' + s.titulo + '</div>'
      + '<div class="concepto-grid">'
      + s.items.map(i =>
        '<div class="concepto-item"><div class="concepto-item-title">' + i.t + '</div><div class="concepto-item-desc">' + i.d + '</div></div>'
      ).join('')
      + '</div>'
    ).join('');
    return '<div class="concepto-card">'
      + '<div class="concepto-title"><span style="font-size:13px;color:#aaa;font-weight:400;">' + c.num + '</span> ' + c.titulo
      + ' <span class="concepto-badge">' + c.badge + '</span></div>'
      + '<div class="concepto-desc" style="margin-bottom:8px;">' + c.intro + '</div>'
      + seccionesHtml
      + '<div class="concepto-alerta">⚠️ ' + c.alerta + '</div>'
      + '</div>';
  }).join('');

  document.getElementById('conceptosContent').innerHTML = html;
}

/* ===== FUTUROS ===== */
function renderFuturos() {
  const livePrice = sym => prices[sym]?.price || 0;

  // Saldo card
  const pnlRealizado = futuresOps.filter(o => o.estado === 'cerrada').reduce((a, o) => a + (o.pnl || 0), 0);
  const posAbiertas = futuresOps.filter(o => o.estado === 'abierta');
  const pnlNoReal = posAbiertas.reduce((a, o) => {
    const cur = livePrice(o.par.replace('-USDT','').replace('USDT',''));
    if (!cur) return a;
    const mult = o.dir === 'long' ? 1 : -1;
    return a + mult * (cur - o.entrada) * o.cantidad;
  }, 0);

  const saldoHtml = `<div class="metric-grid" style="margin-bottom:16px;">
    <div class="metric"><div class="metric-label">Saldo cuenta futuros</div>
      <div class="metric-value" style="display:flex;align-items:center;gap:8px;">
        <span id="futSaldoVal">${fmt(futuresSaldo,2)} USDT</span>
        <button onclick="editFutSaldo()" style="height:24px;padding:0 8px;font-size:11px;"><i class="ti ti-pencil"></i></button>
      </div>
    </div>
    <div class="metric"><div class="metric-label">P&L realizado</div><div class="metric-value ${pnlRealizado>=0?'green':'red'}">${pnlRealizado>=0?'+':''}${fmt(pnlRealizado,2)} USDT</div></div>
    <div class="metric"><div class="metric-label">P&L no realizado</div><div class="metric-value ${pnlNoReal>=0?'green':'red'}">${pnlNoReal>=0?'+':''}${fmt(pnlNoReal,2)} USDT</div></div>
    <div class="metric"><div class="metric-label">Posiciones abiertas</div><div class="metric-value">${posAbiertas.length}</div></div>
  </div>`;

  // Formulario nueva operación
  const formHtml = `<div class="card">
    <div class="card-title">Nueva operación de futuros</div>
    <div class="row">
      <select id="ftDir"><option value="long">Long ▲</option><option value="short">Short ▼</option></select>
      <select id="ftPar">${symbols.map(s=>`<option value="${s}-USDT">${s}-USDT</option>`).join('')}</select>
      <input type="number" id="ftEntrada" placeholder="Precio entrada" step="any" style="width:150px;" />
      <input type="number" id="ftCantidad" placeholder="Cantidad" step="any" />
      <input type="number" id="ftApal" placeholder="Apalancam." step="1" min="1" style="width:110px;" />
    </div>
    <div class="row">
      <input type="number" id="ftTP" placeholder="Take Profit" step="any" />
      <input type="number" id="ftSL" placeholder="Stop Loss" step="any" />
      <input type="date" id="ftFecha" />
      <input type="text" id="ftNotas" placeholder="Notas (opcional)" style="width:180px;" />
      <button onclick="ftCargarPrecio()"><i class="ti ti-cloud-download"></i> Precio actual</button>
      <button class="primary" onclick="addFutureOp()"><i class="ti ti-plus"></i> Añadir</button>
    </div>
    <div id="ftMsg" class="small muted" style="margin-top:4px;"></div>
  </div>`;

  // Simulador
  const simHtml = `<div class="card">
    <div class="card-title">Simulador Long / Short</div>
    <div class="row">
      <select id="fsDir"><option value="long">Long ▲</option><option value="short">Short ▼</option></select>
      <select id="fsPar">${symbols.map(s=>`<option value="${s}-USDT">${s}-USDT</option>`).join('')}</select>
      <input type="number" id="fsEntrada" placeholder="Precio entrada" step="any" style="width:150px;" />
      <input type="number" id="fsCantidad" placeholder="Cantidad" step="any" />
      <input type="number" id="fsApal" placeholder="Apalancam." step="1" min="1" style="width:110px;" />
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px;">
      <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px;">
        <div class="card-title" style="color:#16a34a;margin-bottom:8px;">Take Profit — rellena precio O P&L</div>
        <div class="row" style="margin:0;gap:6px;">
          <input type="number" id="fsTP" placeholder="Precio TP" step="any" style="width:130px;" oninput="fsSyncTP('precio')" />
          <span style="color:#888;font-size:12px;">o</span>
          <input type="number" id="fsTPpnl" placeholder="P&L esperado (USDT)" step="any" style="width:160px;" oninput="fsSyncTP('pnl')" />
        </div>
      </div>
      <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;">
        <div class="card-title" style="color:#dc2626;margin-bottom:8px;">Stop Loss — rellena precio O P&L</div>
        <div class="row" style="margin:0;gap:6px;">
          <input type="number" id="fsSL" placeholder="Precio SL" step="any" style="width:130px;" oninput="fsSyncSL('precio')" />
          <span style="color:#888;font-size:12px;">o</span>
          <input type="number" id="fsSLpnl" placeholder="P&L esperado (USDT)" step="any" style="width:160px;" oninput="fsSyncSL('pnl')" />
        </div>
      </div>
    </div>
    <div class="row">
      <button class="primary" onclick="runFutSim()"><i class="ti ti-calculator"></i> Simular</button>
    </div>
    <div id="fsResult"></div>
  </div>`;

  // Tabla posiciones abiertas
  const abiertasHtml = posAbiertas.length ? `<div class="card">
    <div class="card-title">Posiciones abiertas</div>
    <div class="ovx"><table>
      <thead><tr><th>Dir.</th><th>Par</th><th>Entrada</th><th>Cantidad</th><th>Apal.</th><th>TP</th><th>SL</th><th>P&L actual</th><th>Liquidación</th><th></th></tr></thead>
      <tbody>${posAbiertas.map(o => {
        const sym = o.par.replace('-USDT','');
        const cur = livePrice(sym);
        const mult = o.dir === 'long' ? 1 : -1;
        const pnl = cur ? mult * (cur - o.entrada) * o.cantidad : null;
        const liq = o.dir === 'long' ? o.entrada * (1 - 1/o.apal) : o.entrada * (1 + 1/o.apal);
        const cls = pnl !== null ? (pnl >= 0 ? 'green' : 'red') : '';
        return `<tr>
          <td><span class="tag ${o.dir==='long'?'tag-buy':'tag-sell'}">${o.dir==='long'?'Long ▲':'Short ▼'}</span></td>
          <td>${o.par}</td>
          <td>${fmtPrice(o.entrada)}</td>
          <td>${fmt(o.cantidad,4)}</td>
          <td>${o.apal}x</td>
          <td class="green">${o.tp ? fmtPrice(o.tp) : '—'}</td>
          <td class="red">${o.sl ? fmtPrice(o.sl) : '—'}</td>
          <td class="${cls}">${pnl !== null ? (pnl>=0?'+':'')+fmt(pnl,2)+' USDT' : '—'}</td>
          <td class="red">${fmtPrice(liq)}</td>
          <td style="display:flex;gap:4px;">
            <button onclick="closeFutureOp(${o.id})" class="success" style="height:28px;padding:0 8px;font-size:11px;">Cerrar</button>
            <button onclick="deleteFutureOp(${o.id})" class="danger" style="height:28px;padding:0 8px;font-size:11px;"><i class="ti ti-trash"></i></button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>` : '';

  // Tabla historial futuros
  const cerradas = futuresOps.filter(o => o.estado === 'cerrada');
  const histHtml = cerradas.length ? `<div class="card">
    <div class="card-title">Historial de operaciones cerradas</div>
    <div class="ovx"><table>
      <thead><tr><th>Dir.</th><th>Par</th><th>Entrada</th><th>Cierre</th><th>Cantidad</th><th>Apal.</th><th>P&L</th><th>Fecha</th><th>Notas</th></tr></thead>
      <tbody>${cerradas.map(o => {
        const cls = (o.pnl||0) >= 0 ? 'green' : 'red';
        return `<tr>
          <td><span class="tag ${o.dir==='long'?'tag-buy':'tag-sell'}">${o.dir==='long'?'Long ▲':'Short ▼'}</span></td>
          <td>${o.par}</td>
          <td>${fmtPrice(o.entrada)}</td>
          <td>${fmtPrice(o.cierre)}</td>
          <td>${fmt(o.cantidad,4)}</td>
          <td>${o.apal}x</td>
          <td class="${cls}">${(o.pnl||0)>=0?'+':''}${fmt(o.pnl||0,2)} USDT</td>
          <td>${o.fecha}</td>
          <td class="muted small">${o.notas||'—'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>` : '';

  document.getElementById('futurosContent').innerHTML = saldoHtml + formHtml + simHtml + abiertasHtml + histHtml;
}

function editFutSaldo() {
  const v = prompt('Saldo actual de tu cuenta de futuros (USDT):', futuresSaldo);
  if (v === null) return;
  const n = parseFloat(v);
  if (isNaN(n)) return;
  futuresSaldo = n;
  renderFuturos();
  scheduleSave();
}

function ftCargarPrecio() {
  const par = document.getElementById('ftPar').value;
  const sym = par.replace('-USDT','');
  const p = prices[sym]?.price;
  if (p) {
    document.getElementById('ftEntrada').value = p;
    document.getElementById('ftMsg').textContent = 'Precio actual cargado: ' + fmtPrice(p) + ' USDT';
  } else {
    document.getElementById('ftMsg').textContent = 'Precio no disponible, introdúcelo manualmente.';
  }
}

function addFutureOp() {
  const dir = document.getElementById('ftDir').value;
  const par = document.getElementById('ftPar').value;
  const entrada = parseFloat(document.getElementById('ftEntrada').value);
  const cantidad = parseFloat(document.getElementById('ftCantidad').value);
  const apal = parseFloat(document.getElementById('ftApal').value);
  const tp = parseFloat(document.getElementById('ftTP').value) || null;
  const sl = parseFloat(document.getElementById('ftSL').value) || null;
  const fecha = document.getElementById('ftFecha').value;
  const notas = document.getElementById('ftNotas').value;
  if (isNaN(entrada) || isNaN(cantidad) || isNaN(apal) || !fecha) {
    document.getElementById('ftMsg').textContent = 'Completa entrada, cantidad, apalancamiento y fecha.';
    return;
  }
  futuresOps.push({ id: Date.now(), dir, par, entrada, cantidad, apal, tp, sl, fecha, notas, estado: 'abierta' });
  document.getElementById('ftMsg').innerHTML = '<span class="green">✓</span> Operación añadida correctamente.';
  document.getElementById('ftEntrada').value = '';
  document.getElementById('ftCantidad').value = '';
  document.getElementById('ftApal').value = '';
  document.getElementById('ftTP').value = '';
  document.getElementById('ftSL').value = '';
  document.getElementById('ftNotas').value = '';
  renderFuturos();
  scheduleSave();
}

function closeFutureOp(id) {
  const op = futuresOps.find(o => o.id === id);
  if (!op) return;
  const precioStr = prompt('Precio de cierre de la operación:', prices[op.par.replace('-USDT','')]?.price || '');
  if (precioStr === null) return;
  const cierre = parseFloat(precioStr);
  if (isNaN(cierre)) return;
  const mult = op.dir === 'long' ? 1 : -1;
  op.pnl = mult * (cierre - op.entrada) * op.cantidad;
  op.cierre = cierre;
  op.estado = 'cerrada';
  futuresSaldo += op.pnl;
  renderFuturos();
  scheduleSave();
  showToast((op.pnl >= 0 ? '✓ Ganancia: +' : '✗ Pérdida: ') + fmt(op.pnl, 2) + ' USDT');
}

function deleteFutureOp(id) {
  if (!confirm('¿Eliminar esta operación?')) return;
  futuresOps = futuresOps.filter(o => o.id !== id);
  renderFuturos();
  scheduleSave();
}

function fsGetBase() {
  const entrada = parseFloat(document.getElementById('fsEntrada').value);
  const cantidad = parseFloat(document.getElementById('fsCantidad').value);
  const apal = parseFloat(document.getElementById('fsApal').value);
  const dir = document.getElementById('fsDir').value;
  return { entrada, cantidad, apal, dir, mult: dir === 'long' ? 1 : -1 };
}

function fsSyncTP(fuente) {
  const { entrada, cantidad, mult } = fsGetBase();
  if (isNaN(entrada) || isNaN(cantidad)) return;
  if (fuente === 'precio') {
    const tp = parseFloat(document.getElementById('fsTP').value);
    if (!isNaN(tp)) document.getElementById('fsTPpnl').value = fmt(mult * (tp - entrada) * cantidad, 2).replace(/\./g,',');
  } else {
    const pnl = parseFloat(document.getElementById('fsTPpnl').value);
    if (!isNaN(pnl)) document.getElementById('fsTP').value = (entrada + (pnl / (mult * cantidad))).toFixed(6);
  }
}

function fsSyncSL(fuente) {
  const { entrada, cantidad, mult } = fsGetBase();
  if (isNaN(entrada) || isNaN(cantidad)) return;
  if (fuente === 'precio') {
    const sl = parseFloat(document.getElementById('fsSL').value);
    if (!isNaN(sl)) document.getElementById('fsSLpnl').value = fmt(mult * (sl - entrada) * cantidad, 2).replace(/\./g,',');
  } else {
    const pnl = parseFloat(document.getElementById('fsSLpnl').value);
    if (!isNaN(pnl)) document.getElementById('fsSL').value = (entrada + (pnl / (mult * cantidad))).toFixed(6);
  }
}

function runFutSim() {
  const dir = document.getElementById('fsDir').value;
  const par = document.getElementById('fsPar').value;
  const entrada = parseFloat(document.getElementById('fsEntrada').value);
  const cantidad = parseFloat(document.getElementById('fsCantidad').value);
  const apal = parseFloat(document.getElementById('fsApal').value);
  const tp = parseFloat(document.getElementById('fsTP').value);
  const sl = parseFloat(document.getElementById('fsSL').value);
  if (isNaN(entrada) || isNaN(cantidad) || isNaN(apal)) {
    document.getElementById('fsResult').innerHTML = '<div class="muted small" style="margin-top:8px;">Introduce entrada, cantidad y apalancamiento.</div>';
    return;
  }
  const margen = (entrada * cantidad) / apal;
  const liq = dir === 'long' ? entrada * (1 - 1/apal) : entrada * (1 + 1/apal);
  const mult = dir === 'long' ? 1 : -1;
  const pnlTP = !isNaN(tp) ? mult * (tp - entrada) * cantidad : null;
  const pnlSL = !isNaN(sl) ? mult * (sl - entrada) * cantidad : null;
  const rr = pnlTP !== null && pnlSL !== null ? Math.abs(pnlTP / pnlSL) : null;
  const dirLabel = dir === 'long' ? 'Long ▲' : 'Short ▼';
  const liqCls = dir === 'long' ? 'red' : 'green';

  document.getElementById('fsResult').innerHTML = `<div class="sim-result-box" style="margin-top:1rem;">
    <div class="sim-row"><span>Dirección</span><span><span class="tag ${dir==='long'?'tag-buy':'tag-sell'}">${dirLabel}</span></span></div>
    <div class="sim-row"><span>Par</span><span>${par}</span></div>
    <div class="sim-row"><span>Precio entrada</span><span>${fmtPrice(entrada)} USDT</span></div>
    <div class="sim-row"><span>Cantidad</span><span>${fmt(cantidad,4)}</span></div>
    <div class="sim-row"><span>Apalancamiento</span><span>${apal}x</span></div>
    <div class="sim-row"><span>Margen necesario</span><span style="font-weight:600;">${fmt(margen,2)} USDT</span></div>
    <div class="sim-row"><span class="${liqCls}">Precio de liquidación</span><span class="${liqCls}" style="font-weight:600;">${fmtPrice(liq)} USDT</span></div>
    ${pnlTP !== null ? `<div class="sim-row"><span class="green">P&L en TP (${fmtPrice(tp)})</span><span class="green">+${fmt(pnlTP,2)} USDT (${fmt(pnlTP/margen*100,1)}% margen)</span></div>` : ''}
    ${pnlSL !== null ? `<div class="sim-row"><span class="red">P&L en SL (${fmtPrice(sl)})</span><span class="red">${fmt(pnlSL,2)} USDT (${fmt(pnlSL/margen*100,1)}% margen)</span></div>` : ''}
    ${rr !== null ? `<div class="sim-row"><span>Ratio Riesgo/Beneficio</span><span style="font-weight:600;">1 : ${fmt(rr,2)}</span></div>` : ''}
  </div>`;
}
loadData();
populateSymSelects();
renderOpsTable();
fetchPrices();
setInterval(fetchPrices, 15000);
</script>
